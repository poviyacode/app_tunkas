@if (this.recentPostMedias.length > 0) {
<div class="grid grid-cols-3 gap-1">
    @for (item of recentPostMedias; track $index) {
    <div (click)="onModalPost(item, $index)" class="w-full h-24 rounded-md overflow-hidden relative cursor-pointer">
        @if (item.type === 'image') {
        <img [src]="item.cloudflare ? item.cloudflare.result.variants[0] : item.url" alt=""
            class="h-24 w-full object-cover">
        }
        @if (item.type === 'video') {
        <div class="video-container">
            <img [src]="item?.cloudflare ? 'https://customer-6kruyx7h361tmu11.cloudflarestream.com/' + item.cloudflare.result.uid + '/thumbnails/thumbnail.gif?time=1s&height=200&duration=6s' : item.urlSnapshot"
                alt="" class="h-24 w-full object-cover">
            <!-- <div class="absolute inset-0 flex justify-start items-end text-white m-2">
              <i class="fa-solid fa-play text-sm"></i>
            </div> -->
        </div>
        }

        @if (subscriptionExpiredQuery(item.Post!)) {
        <div
            class="absolute inset-0 text-white dark:text-zinc-300 bg-zinc-100/50 dark:bg-zinc-800/50 m-0 {{item.Post!.previewMedia == true ? 'rounded-md backdrop-blur-sm m-2 sm:m-2': 'backdrop-blur-lg'}}">
            <div class="m-1 ">
                <i class="fa-solid fa-lock text-sm"></i>
            </div>
        </div>
        }
    </div>
    }
</div>
} @else if (loadingRecentMedia) {
<div class="w-full mx-auto shadow-sm grid grid-cols-3 gap-1">
    @for (item of postLoadingRecentMedia; track $index) {
    <div
        class=" animate-pulse w-full h-24 border border-zinc-100 dark:border-zinc-800 bg-zinc-50 dark:bg-zinc-800/40 shadow-sm rounded ">
    </div>
    }
</div>
}
