<form [formGroup]="myform" novalidate (submit)="onSubmit()" class="flex items-center w-full px-2">
  <div class="flex flex-col sm:flex-row sm:space-x-2 w-full items-center">
    <div class="relative w-full">
      <div class="absolute left-2 top-2 text-zinc-400 font-bold">
        <i class="fa-solid fa-magnifying-glass"></i>
      </div>
      <input formControlName="q" id="q" placeholder="{{'search_users_or_posts' | translate}}" (keydown.enter)="onEnterKey($event)"
        class="pl-8 w-full py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-primary-600"
        [ngClass]="inputClass(myform, 'q')">
    </div>
  </div>
</form>
