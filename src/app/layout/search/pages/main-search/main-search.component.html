@if (this.isBrowser) {
<div class="mx-0">
    <header
        class="sticky top-0 w-full pt-3 px-4 bg-white dark:bg-background-dark text-zinc-600 dark:text-zinc-200 shadow-md z-20">

        <div class="flex justify-center w-full mb-4">
            <form novalidate (ngSubmit)="onSubmit()" [formGroup]="myform"
                class="flex items-center w-full max-w-screen-lg space-y-0" aria-label="Search form">

                <div
                    class="flex w-full items-center bg-white dark:bg-zinc-800 border border-zinc-300 dark:border-zinc-700 rounded-lg overflow-hidden">

                    <input formControlName="q" id="q" type="text"
                        class="w-full px-4 py-2 bg-transparent focus:outline-none text-zinc-700 dark:text-zinc-200"
                        placeholder="{{ 'search_users_or_posts' | translate }}">

                    <button type="submit"
                        class="px-4 py-2 bg-primary-600 hover:bg-primary-700 text-white font-semibold transition duration-200 ease-in-out">
                        {{ 'search' | translate }}
                    </button>
                </div>
            </form>

        </div>

        <nav class="flex justify-center space-x-4 text-zinc-600 dark:text-zinc-400 px-4 lg:px-0 text-sm">
            <a routerLink="/search/users" [queryParams]="{ q: search }" (click)="onScrollTop()"
                [routerLinkActive]="['text-primary-600', 'dark:text-primary-500', 'border-b-2', 'border-primary-600']"
                [routerLinkActiveOptions]="{ exact: false }"
                class="py-2 px-6 font-semibold text-center uppercase transition duration-300 ease-in-out hover:bg-zinc-100 dark:hover:bg-zinc-800">
                <span>{{ 'models' | translate }}</span>
            </a>
            <a routerLink="/search/posts" [queryParams]="{ q: search }" (click)="onScrollTop()"
                [routerLinkActive]="['text-primary-600', 'dark:text-primary-500', 'border-b-2', 'border-primary-600']"
                [routerLinkActiveOptions]="{ exact: false }"
                class="py-2 px-6 font-semibold text-center uppercase transition duration-300 ease-in-out hover:bg-zinc-100 dark:hover:bg-zinc-800">
                <span>{{ 'posts' | translate }}</span>
            </a>
        </nav>
    </header>

    @if (search && search !== 'all') {
    <section class="my-5 mx-2 font-light text-lg">
        <h2 class="sr-only">{{ 'Results for' | translate }}</h2>
        <p>{{'resultsFor' | translate}}: {{search}}</p>
    </section>
    }

    <main class=" mt-2 mb-16">
        <router-outlet></router-outlet>
    </main>
</div>
}
