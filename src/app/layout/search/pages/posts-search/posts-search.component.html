<router-outlet></router-outlet>
<ng-container #container></ng-container>

<main class="space-y-0 px-2 md:px-2 my-4 md:mt-10 md:mb-16">
  <div class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 2xl:grid-cols-6 gap-2 md:gap-4 p-1 sm:p-4">

    @for (item of this.postService.posts(); track $index) {
    <app-post-card [item]="item" [showProfile]="false" (postClick)="onPost($event)"></app-post-card>
    }

    @if (loading()) {
    @for (item of [1,2,3,4,5,6]; track $index) {
    <div class="aspect-[2/3] bg-zinc-200 dark:bg-zinc-800 rounded-[1.5rem] md:rounded-[2.5rem] animate-pulse"></div>
    }
    }
  </div>
</main>

@if (!loading() && this.postService.posts().length === 0) {
<div
  class="flex flex-col items-center justify-center min-h-[50vh] text-center space-y-6 text-zinc-500 dark:text-zinc-400">
  <!-- Ícono principal -->
  <div class="flex items-center justify-center w-24 h-24 bg-zinc-100 dark:bg-zinc-800 rounded-full shadow-md">
    <i appIcon iconName="grid-view-regular" [size]="'w-12 h-12'" [color]="'text-zinc-500 dark:text-zinc-400'"></i>
  </div>

  <!-- Título principal -->
  <h2 class="text-2xl font-medium text-zinc-700 dark:text-zinc-200">{{'noPostsYet' | translate}}</h2>

  <!-- Mensaje secundario -->
  <p class="text-base font-light max-w-md hidden">
    {{'startSavingYourFavoriteContent' | translate}}
  </p>

</div>
}
