@if (dialogService.activeModal() === 'messageBroadcast') {
  <div [ngClass]="modalClass()" class="modal-center">
    <div [ngClass]="cardModalClass()"
      class="w-full h-auto max-h-screen max-w-md sm:max-w-xl lg:max-w-3xl mx-auto overflow-hidden"
      (click)="($event.stopPropagation())" @flyInOut>
      <section class="w-full h-full p-4 sm:p-4 overflow-y-auto max-h-screen space-y-5">

        <div class="space-y-1">
          <div class="flex justify-between items-center py-2 relative">
            <h2 class="text-lg font-bold absolute left-1/2 transform -translate-x-1/2 flex items-center gap-2">
              <i appIcon iconName="search-regular" [size]="'w-6 h-6'" [color]="'text-primary-500'"></i>
              <span class="text-xl whitespace-nowrap">
                {{ 'Mensaje de difusion' | translate }} 💖
              </span>
            </h2>
            <button (click)="onCloseModal()"
              class="cursor-pointer ml-auto relative z-10 flex justify-center items-center hover:bg-zinc-100 hover:dark:bg-zinc-700/30 rounded-full p-2 w-8 h-8">
              <span appIcon iconName="close-regular" [size]="'w-6 h-6'" [color]="''"></span>
            </button>
          </div>

          <p class="text-zinc-500 dark:text-zinc-400 font-light text-lg text-center">
            {{'whereConnectionsBecomeStories' | translate}}
          </p>
        </div>

        <form novalidate (ngSubmit)="onSearch()" [formGroup]="myFormMessageBroadcast" class="space-y-4">
          <div class="relative group">
            <div
              class="absolute inset-0 bg-gradient-to-r from-primary-500/10 to-primary-700/10 rounded-3xl blur-xl opacity-30 group-hover:opacity-50 transition-opacity">
            </div>
            <div class="relative">
              <div class="absolute left-2 top-1/2 -translate-y-1/2 text-zinc-400 dark:text-zinc-500">
                <i appIcon iconName="favorite-regular" [size]="'w-6 h-6'" aria-hidden="true"
                [color]="''"></i>
              </div>
              <input type="text" formControlName="search" placeholder="{{'whatYourHeartSeeks' | translate}}"
                (keydown.enter)="onSearch()"
                class="w-full pl-9 md:pl-10 pr-6 md:pr-6 py-3 rounded-xl border border-zinc-200 dark:border-zinc-700 bg-zinc-100/60 dark:bg-zinc-900/50 text-xl font-light text-zinc-800 dark:text-zinc-100 ring-2 ring-white/20 focus:ring-4 focus:ring-primary-500/30 placeholder-zinc-400 dark:placeholder-zinc-500 transition-all duration-300">

              </div>
            </div>

            <!-- Filtros - Diseño Joya -->
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
              <!-- Género -->
              <div class="relative group">
                <div
                  class="absolute -inset-0.5 bg-gradient-to-r from-primary-500/30 to-primary-700/30 rounded-2xl blur opacity-0 group-hover:opacity-30 transition-opacity">
                </div>
                <div
                  class="relative bg-zinc-100/60 dark:bg-zinc-900/50 rounded-xl p-1 border border-zinc-200 dark:border-zinc-700">
                  <select formControlName="gender"
                    class="w-full px-4 py-2 bg-transparent text-zinc-800 dark:text-zinc-100 text-lg font-medium appearance-none rounded-lg">
                    <option value="" class="bg-white dark:bg-zinc-800">✨ {{'allGenders' | translate}}
                    </option>
                    <option value="WOMAN" class="bg-white dark:bg-zinc-800">👩‍🦰 {{'women' | translate}}
                    </option>
                    <option value="MAN" class="bg-white dark:bg-zinc-800">👨‍🦰 {{'men' | translate}}
                    </option>
                  </select>
                </div>
              </div>

              <!-- Edad -->
              <div class="relative group">
                <div
                  class="absolute -inset-0.5 bg-gradient-to-r from-primary-500/30 to-primary-700/30 rounded-2xl blur opacity-0 group-hover:opacity-30 transition-opacity">
                </div>
                <div
                  class="relative bg-zinc-100/60 dark:bg-zinc-900/50 rounded-xl p-1 border border-zinc-200 dark:border-zinc-700">
                  <div class="flex items-center justify-between px-4 py-2">
                    <div class="flex items-center gap-4">
                      <i class="fa-solid fa-cake-candles text-primary-500"></i>
                      <div class="flex items-center gap-3">
                        <input formControlName="minAge" type="text" placeholder="18"
                          class="w-full bg-transparent text-center text-lg font-medium text-zinc-900 dark:text-zinc-100 border-b-2 border-primary-500/30 focus:border-primary-500 focus:outline-none">
                          <span class="text-zinc-400">—</span>
                          <input formControlName="maxAge" type="text" placeholder="35"
                            class="w-full  bg-transparent text-center text-lg font-medium text-zinc-900 dark:text-zinc-100 border-b-2 border-primary-700/30 focus:border-primary-700 focus:outline-none">
                          </div>
                        </div>
                      </div>
                    </div>
                  </div>

                  <!-- Ubicación -->
                  <div class="relative group">
                    <div
                      class="absolute -inset-0.5 bg-gradient-to-r from-primary-500/30 to-primary-700/30 rounded-2xl blur opacity-0 group-hover:opacity-30 transition-opacity">
                    </div>
                    <div
                      class="relative bg-zinc-100/60 dark:bg-zinc-900/50 rounded-xl p-1 border border-zinc-200 dark:border-zinc-700">
                      <select formControlName="country"
                        class="w-full px-4 py-2 bg-transparent text-zinc-800 dark:text-zinc-100 text-lg font-medium appearance-none rounded-lg">
                        <option value="" class="bg-white dark:bg-zinc-800">🌍 {{'anyLocation' | translate}}
                        </option>
                        @for (item of countries(); track item) {
                          <option [value]="item._id"
                            class="bg-white dark:bg-zinc-800">
                            {{ item.name! | translate}}
                          </option>
                        }
                      </select>
                    </div>
                  </div>
                </div>

                <div class="flex justify-end">
                  <button type="submit"
                    class="cursor-pointer px-6 py-2 bg-primary-500 hover:bg-primary-600 text-white font-medium rounded-full transition-all duration-300">
                    {{'search' | translate}}
                  </button>
                </div>
              </form>

            </section>
          </div>
        </div>
      }
