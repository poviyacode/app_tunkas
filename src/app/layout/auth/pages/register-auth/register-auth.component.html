@if (isBrowser) {
  <ng-container #container></ng-container>
  <section class="min-h-screen flex items-center justify-center bg-zinc-50 dark:bg-zinc-950 relative overflow-hidden">
    <div
      class="absolute top-0 -left-4 w-72 h-72 bg-primary-300 rounded-full mix-blend-multiply filter blur-3xl opacity-20 animate-blob">
    </div>
    <div
      class="absolute bottom-0 -right-4 w-72 h-72 bg-pink-300 rounded-full mix-blend-multiply filter blur-3xl opacity-20 animate-blob animation-delay-2000">
    </div>

    <div class="absolute inset-0 z-0">
      <img
        src="https://image.qwenlm.ai/public_source/0f627eaa-9dd7-4a2e-a29c-c04e934860ee/004718b93-0d2d-492a-9460-a4d2fd5648365836.png"
        alt="Background" class="w-full h-full object-cover opacity-10 dark:opacity-20">
        <div
          class="absolute inset-0 bg-gradient-to-b from-transparent via-zinc-50/50 to-zinc-50 dark:via-zinc-950/50 dark:to-zinc-950">
        </div>
      </div>

      <div class="w-full max-w-md px-6 z-10">
        <div
          class="bg-white/80 dark:bg-zinc-900/80 backdrop-blur-xl border border-white/20 dark:border-zinc-800 shadow-2xl rounded-3xl p-8 md:p-10">

          <div class="flex justify-between items-start mb-8">
            <a routerLink="/" class="group">
              <div class="relative w-12 h-12">
                <img class="w-full h-full rounded-2xl shadow-lg transition-transform duration-500 group-hover:scale-105"
                  src="./public/logo/icon.webp" alt="Logo" />
                </div>
              </a>

              <div class="relative">
                <form [formGroup]="myformLanguage">
                  <select formControlName="language" #langSelect (change)="changeLang(langSelect.value)"
                    class="cursor-pointer rounded-full py-1.5 px-3 focus:outline-none focus:ring bg-background-light dark:bg-background-dark  focus:ring-zinc-200 active:ring-zinc-200  focus:dark:ring-zinc-700 active:ring  active:dark:ring-zinc-700">
                    @for (lang of langs; track $index) {
                      <option [value]="lang.value" class="notranslate">
                        {{ lang.name }}
                      </option>
                    }
                  </select>
                </form>
              </div>
            </div>

            <div class="mb-8">
              <h1 class="text-2xl md:text-2xl font-bold text-zinc-900 dark:text-white tracking-tight">
                {{ 'connectionsThatInspire' | translate }}
              </h1>
              <p class="hidden text-zinc-500 dark:text-zinc-400 mt-2 text-sm leading-relaxed">
                {{ 'enterEmailToResetPassword' | translate }}
              </p>
            </div>

            <form [formGroup]="myForm" id="form" novalidate autocomplete="off" (ngSubmit)="register()"
              class="space-y-4 backdrop-blur-sm">

              <!-- Input Name -->
              <fieldset class="space-y-2">
                <label class="hidden text-sm font-medium ">
                  <i appIcon iconName="user-regular" [size]="'w-6 h-6'" [color]="''"></i>
                  {{ 'name' | translate }}
                </label>
                <div class="relative">
                  <input formControlName="alias" type="text" class="pl-10" placeholder="{{ 'name' | translate }}"
                    [ngClass]="inputClass(myForm,'alias')" />
                    <div class="absolute inset-y-0 left-0 pl-2 flex items-center ">
                      <i appIcon iconName="user-regular" [size]="'w-6 h-6'" [color]="''"></i>
                    </div>
                  </div>
                </fieldset>

                <fieldset class="flex space-x-1">
                  <div class="w-full sm:w-1/2 flex flex-col space-y-2">
                    <label for="gender" class="hidden text-sm font-medium ">
                      <i appIcon iconName="wc-regular" [size]="'w-6 h-6'" [color]="''"></i>
                      {{ 'gender' |
                      translate }}
                    </label>
                    <div class="relative w-full">
                      <select formControlName="gender" [ngClass]="inputClass(myForm, 'gender')" autocomplete="off">
                        @for (item of genderArray; track item) {
                          <option [value]="item.value">{{ item.name | translate
                          }}</option>
                        }
                      </select>
                    </div>
                  </div>
                  <div class="w-full sm:w-1/2 flex flex-col space-y-2">
                    <label for="gender" class="hidden text-sm font-medium ">
                      <i appIcon iconName="cake-add-regular" [size]="'w-6 h-6'" [color]="''"></i>
                      {{ 'age' | translate }}
                    </label>
                    <div class="relative w-full">
                      <input formControlName="age" id="age" minlength="2" maxlength="2" [ngClass]="inputClass(myForm, 'age')"
                        placeholder="{{ 'age' | translate }}" />
                      </div>
                    </div>
                  </fieldset>

                  <fieldset class="flex space-x-1">
                    <div class="w-full sm:w-1/2 flex flex-col space-y-2">
                      <label for="country" class="block text-sm font-medium ">
                        <i appIcon iconName="flag-regular" [size]="'w-6 h-6'" [color]="''"></i>
                        {{ 'country' |
                        translate }}
                      </label>
                      <div class="relative w-full">
                        <select formControlName="country" [ngClass]="inputClass(myForm, 'country')" autocomplete="off">
                          @for (item of countries(); track item) {
                            <option [value]="item.code">
                            {{ item.name! | translate }}</option>
                          }
                        </select>
                      </div>
                    </div>
                  </fieldset>

                  <!-- Input Email Romántico -->
                  <fieldset class="space-y-2">
                    <label class="hidden text-sm font-medium ">
                      <i appIcon iconName="heart-check-regular" [size]="'w-6 h-6'" [color]="''"></i>
                      {{ 'email' | translate }}
                    </label>
                    <div class="relative">
                      <input formControlName="email" type="email" class="w-full pl-10" placeholder="{{ 'email' | translate }}"
                        [ngClass]="inputClass(myForm,'email')" />
                        <div class="absolute inset-y-0 left-0 pl-2 flex items-center ">
                          <i appIcon iconName="mark-email-read-regular" [size]="'w-6 h-6'" [color]="''"></i>
                        </div>
                      </div>
                    </fieldset>

                    <!-- Input Password Íntimo -->
                    <fieldset class="space-y-2">
                      <label class="hidden text-sm font-medium ">
                        <i appIcon iconName="lock-regular" [size]="'w-6 h-6'" [color]="''"></i>
                        {{ 'password' | translate }}
                      </label>
                      <div class="relative">
                        <input formControlName="password" type="password" class="w-full pl-10"
                          placeholder="{{ 'password' | translate }}" [ngClass]="inputClass(myForm,'password')" />
                          <div class="absolute inset-y-0 left-0 pl-2 flex items-center ">
                            <i appIcon iconName="lock-regular" [size]="'w-6 h-6'" [color]="''"></i>
                          </div>
                        </div>
                      </fieldset>

                      <!-- Input Password Íntimo -->
                      <fieldset class="space-y-2">
                        <label class="hidden text-sm font-medium ">
                          <i appIcon iconName="lock-regular" [size]="'w-6 h-6'" [color]="''"></i>
                          {{ 'repeatpassword' | translate }}
                        </label>
                        <div class="relative">
                          <input formControlName="confirmPassword" type="password" class="w-full pl-10"
                            placeholder="{{ 'repeatpassword' | translate }}" [ngClass]="inputClass(myForm,'confirmPassword')" />
                            <div class="absolute inset-y-0 left-0 pl-2 flex items-center ">
                              <i appIcon iconName="lock-regular" [size]="'w-6 h-6'" [color]="''"></i>
                            </div>
                          </div>
                        </fieldset>

                        <!-- Terms and Conditions -->
                        <fieldset class="flex items-center">
                          <label for="terms" class="flex items-center cursor-pointer">
                            <div class="relative">
                              <input id="terms" formControlName="terms" type="checkbox" class="sr-only peer" />
                              <div
                                class="block w-10 h-6 rounded-full bg-zinc-300 dark:bg-zinc-700 peer-checked:bg-primary-600 transition duration-300">
                              </div>

                              <div
                                class="absolute left-1 top-1 w-4 h-4 bg-white dark:bg-zinc-50 rounded-full transition transform peer-checked:translate-x-full shadow-md duration-300">
                              </div>
                            </div>
                            <div class="ml-3 font-medium text-sm text-zinc-800 dark:text-zinc-200">
                              {{ 'terms_policy.termsAndConditions' | translate }}
                              <a routerLink="/legal/terms" class="text-primary-500 font-semibold ">{{ 'terms_policy.termsLink' |
                                translate
                              }}</a>,
                              {{ 'terms_policy.privacyPolicy' | translate }}
                              <a routerLink="/legal/policy" class="text-primary-500 font-semibold">{{ 'terms_policy.privacyLink' |
                              translate }}</a>.
                            </div>
                          </label>
                        </fieldset>

                        <!-- Botón de Acción Principal -->
                        <button type="submit" [disabled]="myForm.status !== 'VALID'" [ngClass]="buttonClass()" class="mt-4 w-full">
                          <span class="tracking-wider">{{ 'signUp' | translate }}</span>
                        </button>

                        <!-- Enlaces Secundarios -->
                        <div class="mt-8 pt-6 border-t border-zinc-100 dark:border-zinc-800 space-y-3">
                          <p class="text-zinc-600 dark:text-zinc-400 text-sm text-center">
                            {{ 'alreadyHaveAccount' | translate }}
                            <a routerLink="/auth/login" class="text-primary-600 dark:text-primary-400 font-bold hover:underline ml-1">
                              {{ 'logIn' | translate }}
                            </a>
                          </p>
                        </div>

                      </form>
                    </div>
                    <p class="text-center mt-8 text-zinc-400 dark:text-zinc-600 text-xs tracking-widest uppercase">
                      &copy; {{currentYear}} YUVINKA
                    </p>
                  </div>
                </section>
              }
