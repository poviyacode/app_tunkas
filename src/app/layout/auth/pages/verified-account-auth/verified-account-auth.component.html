<div
    class="flex flex-col items-center justify-center h-full">
    <div class="bg-white dark:bg-zinc-800 shadow-lg rounded-lg p-6 w-full max-w-md  border border-zinc-100 dark:border-zinc-800">
        <h2 class="text-2xl font-semibold text-center text-zinc-700 dark:text-zinc-200">
            Email Verification
        </h2>
        <p class="text-center text-zinc-500 dark:text-zinc-400 text-sm">
            {{authService.user()?.email}}
        </p>
        <p class="text-zinc-500 dark:text-zinc-400 text-center mt-2">
            Enter the verification code sent to your email.
        </p>

        <form [formGroup]="myForm" (ngSubmit)="verifyEmail()" class="mt-4">
            <div class="mb-4 space-y-2">
                <label for="verificationCode"
                    class="block text-sm font-medium text-zinc-600 dark:text-zinc-300">Verification Code</label>
                <input id="verificationCode" type="text" formControlName="verificationCode"
                    [ngClass]="inputClass(myForm,'verificationCode')" placeholder="Enter the code" />
            </div>

            <button type="submit" [disabled]="myForm.invalid || isVerifying"
                class="w-full px-4 py-2 text-white bg-primary-600 dark:bg-primary-700 rounded-lg hover:bg-primary-700 dark:hover:bg-primary-800 focus:outline-none disabled:bg-gray-400 disabled:cursor-not-allowed">
                Verify
            </button>

        </form>
    </div>
</div>
