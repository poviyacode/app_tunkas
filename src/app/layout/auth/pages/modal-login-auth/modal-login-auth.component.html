@if (dialogService.activeModal() === 'login') {
<div class="modal-center fixed inset-0 flex items-center justify-center p-4 z-50" (click)="onCloseModal()">
    <div [ngClass]="cardModalClass()" class="w-full max-w-xl overflow-hidden" (click)="($event.stopPropagation())"
        @flyInOut>
        <section div class="p-6 sm:p-8 overflow-y-auto max-h-[80vh]">

            <!-- Logo con efecto sofisticado -->
            <div (click)="onCloseModal()" class="group mb-12 flex flex-col items-center">
                <div class="relative">
                    <img class="w-14 h-14 bg-white lg:animate-pulse rounded-full transition-all duration-500 group-hover:scale-110 shadow-xl group-hover:shadow-2xl"
                        src="./public/logo/icon.webp" alt="AmorPerfecto Logo" />
                    <div
                        class="absolute -inset-2 rounded-full bg-gradient-to-r from-primary-500 to-pink-600 opacity-20 group-hover:opacity-30 transition-opacity">
                    </div>
                </div>
                <p class="mt-4 text-sm text-primary-600 dark:text-primary-300 font-semibold tracking-widest">
                    {{'connectionsThatInspire' | translate}}
                </p>
            </div>

            <!-- Formulario de Login -->
            <form [formGroup]="myForm" id="form" novalidate autocomplete="off" (ngSubmit)="login()" class="space-y-6">

                <!-- Input Email Romántico -->
                <div class="space-y-2">
                    <label class="block text-sm font-medium text-primary-800 dark:text-primary-200">
                        <i appIcon iconName="heart-check-regular" [size]="'w-6 h-6'" [color]="''"></i>
                        {{ 'emailOrLoveUser' | translate }}
                    </label>
                    <div class="relative">
                        <input formControlName="username" type="email" class="w-full pl-12 text-lg"
                            placeholder="{{ 'yourLoveEmail' | translate }}" [ngClass]="inputClass(myForm,'username')" />
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center text-primary-400">
                            <i appIcon iconName="mark-email-read-regular" [size]="'w-6 h-6'" [color]="''"></i>
                        </div>
                    </div>
                </div>

                <!-- Input Password Íntimo -->
                <div class="space-y-2">
                    <label class="block text-sm font-medium text-primary-800 dark:text-primary-200">
                        <i appIcon iconName="lock-regular" [size]="'w-6 h-6'" [color]="''"></i>
                        {{ 'secretPassword' | translate }}
                    </label>
                    <div class="relative">
                        <input formControlName="password" type="password" class="w-full pl-12 text-lg"
                            placeholder="{{ 'heartSecret' | translate }}" [ngClass]="inputClass(myForm,'password')" />
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center text-primary-400">
                            <i appIcon iconName="lock-regular" [size]="'w-6 h-6'" [color]="''"></i>
                        </div>
                    </div>
                </div>

                <!-- Botón de Acción Principal -->
                <button type="submit" [disabled]="myForm.status !== 'VALID'" [ngClass]="buttonClass()"
                    class="mt-4 w-full px-4 py-4 rounded-full">
                    <span class="tracking-wider">{{ 'logIn' | translate }}</span>
                </button>

                <!-- Enlaces Secundarios -->
                <div class="text-center space-y-4 pt-6">
                    <a routerLink="/auth/forgot-password"
                        class="text-primary-600 hover:text-primary-800 dark:text-primary-300 dark:hover:text-primary-400 text-sm font-medium transition-colors duration-300">
                        {{ 'forgotPassword' | translate }}
                    </a>

                    <p class="text-zinc-600 dark:text-zinc-300 text-sm pt-4 border-t border-primary-100/30">
                        {{ 'noAccountYet' | translate }}
                        <a routerLink="/auth/register"
                            class="ml-2 text-primary-600 hover:text-primary-800 dark:text-primary-300 dark:hover:text-primary-400 font-semibold underline decoration-2 underline-offset-4 hover:decoration-primary-300 transition-all">
                            <i appIcon iconName="ecg-heart-regular" [size]="'w-6 h-6'" [color]="''"></i>
                            {{ 'signUp' | translate }}
                        </a>
                    </p>
                </div>
            </form>

        </section>
    </div>
</div>
}
