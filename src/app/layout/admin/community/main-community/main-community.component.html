@if (isBrowser) {
<div class="mx-auto max-w-7xl">

    <ng-container #container></ng-container>

    <header
        class="sticky top-0 w-full py-3 px-4 text-xs bg-background-light dark:bg-background-dark dark:text-zinc-200 z-10">

        <div class="flex justify-between items-center space-x-5 h-12">

            <button (click)="goBack()"
                class="cursor-pointer flex items-center justify-center w-10 h-10 rounded-full transition duration-300 ease-in-out hover:bg-zinc-100 dark:hover:bg-zinc-800">
                <i appIcon iconName="arrow-back-regular" [size]="'w-6 h-6'" [color]="''" class="flex-shrink-0 pl-1"></i>
            </button>

            <button (click)="onScrollTop()"
                class="cursor-pointer flex items-center justify-center px-4 py-2 text-sm font-semibold text-center text-zinc-700 dark:text-zinc-200 uppercase rounded-full transition duration-300 ease-in-out hover:bg-zinc-100 dark:hover:bg-zinc-800">
                <span>{{'myCommunity' | translate}}</span>
            </button>
        </div>
    </header>

    <ul
        class="flex gap-2 mx-2 p-1 bg-zinc-100 dark:bg-zinc-900/50 backdrop-blur-md rounded-2xl mb-6 border border-zinc-200 dark:border-zinc-800">
        @for (link of links(); track $index) {
        <li class="flex-1 list-none">
            <a [routerLink]="link.path" [routerLinkActiveOptions]="{ exact: false }"
                routerLinkActive="bg-white dark:bg-zinc-800 text-primary-600 dark:text-primary-400 shadow-sm active-state"
                (click)="onLinkClick(link)"
                class="relative flex items-center justify-center h-11 px-4 rounded-xl text-zinc-500 dark:text-zinc-400 font-semibold text-sm transition-all duration-300 ease-out hover:text-primary-500 group">

                <span class="relative z-10 truncate transition-transform duration-200 group-active:scale-95">
                    {{ link.title | translate }}
                </span>

                <span routerLinkActive="w-1/3 opacity-100"
                    class="absolute bottom-1.5 left-1/2 -translate-x-1/2 h-[3px] w-0 bg-primary-500 rounded-full opacity-0 transition-all duration-300 ease-in-out">
                </span>
            </a>
        </li>
        }
    </ul>
    <div class="mx-2 mb-16">
        <router-outlet></router-outlet>
    </div>

</div>
}
