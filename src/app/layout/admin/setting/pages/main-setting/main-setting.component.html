@if (isBrowser) {
<div class="flex flex-col lg:flex-row lg:space-x-8 max-w-7xl mx-auto">
  <!-- Sidebar -->
  @if (!isMobile || showSidebar) {
  <aside class="lg:block w-full lg:w-72 top-0 left-0 bottom-0 transition-transform duration-300 ease-in-out"
    [class]="isMobile && !showSidebar ? 'translate-x-[-100%]' : ''">
    <nav
      class="flex flex-col space-y-4 mt-0 lg:mt-4 p-4 bg-background-light dark:bg-background-dark rounded-3xl lg:shadow-xl lg:border border-zinc-200 dark:border-zinc-800">
      <div class="flex items-center justify-between pb-4 border-b border-zinc-200 dark:border-zinc-800">
        <span class="text-lg font-bold text-zinc-800 dark:text-zinc-200">
          {{ 'accountSettings' | translate }}
        </span>
        @if (isMobile) {
        <button (click)="toggleSidebar()" class="text-zinc-500 hover:text-zinc-700 dark:hover:text-zinc-300">
          <i appIcon iconName="close-regular" [size]="'w-6 h-6'" [color]="''"></i>
        </button>
        }
      </div>

      <!-- Navigation Links -->
      <ul class="flex flex-col space-y-1 font-medium">

        @for (link of links(); track $index) {
        <li [routerLinkActiveOptions]="{ exact: false }"
          routerLinkActive="bg-zinc-50 dark:bg-zinc-800/50 text-primary-600 dark:text-primary-500 rounded-xl shadow-sm">
          <a (click)="onLinkClick(link)" [routerLink]="link.path"
            class="flex justify-between items-center h-10 px-4 rounded-xl hover:bg-primary-50 dark:hover:bg-zinc-600/30 transition-colors duration-200">

            <span class="flex items-center">
              <i appIcon [iconName]="link.icon" [size]="'w-5 h-5'" [color]="''"></i>
            </span>

            <span class="ml-3 flex-1 text-sm tracking-wide truncate">
              {{ link.title | translate }}
            </span>

            <span class="">
              <i appIcon iconName="arrow-forward-regular" [size]="'w-4 h-4'" [color]="''"></i>
            </span>

          </a>
        </li>
        }
      </ul>
    </nav>
  </aside>
  }

  <!-- Main Content -->
  @if (selectedContent) {
  <main class="flex-1 flex flex-col min-h-0 mb-20">

    @if (isMobile) {
    <header
      class="sticky top-0 z-10 p-4 bg-background-light/80 dark:bg-background-dark/80 backdrop-blur-md border-b border-zinc-200 dark:border-zinc-800">
      <button (click)="goBackToSidebar()"
        class="font-medium flex items-center space-x-2 text-zinc-700 dark:text-zinc-200 hover:text-primary-600 transition-colors">
        <i appIcon iconName="arrow-back-regular" [size]="'w-5 h-5'" [color]="''"></i>
        <span>{{ 'return' | translate }}</span>
      </button>
    </header>
    }

    <section class="flex-1 overflow-y-auto p-4 sm:p-6">
      <router-outlet></router-outlet>
    </section>

  </main>
  }
</div>
}
